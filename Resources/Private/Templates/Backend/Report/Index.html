<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:flashMessages />

<f:if condition="{reports -> f:count()} == 0">
    <f:then>
        <div class="callout callout-info">
            <div class="callout-body">
                <h4 class="callout-title">No reports yet</h4>
                <p class="mb-0">Create your first SEO report using the <strong>New Report</strong> button above.</p>
            </div>
        </div>
    </f:then>
    <f:else>
        <div class="table-fit">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>URL</th>
                        <th>Status</th>
                        <th class="text-center">Score</th>
                        <th class="text-center">Pages</th>
                        <th>Created</th>
                        <th class="col-control"></th>
                    </tr>
                </thead>
                <tbody>
                    <f:for each="{reports}" as="report">
                        <f:variable name="showUri"><f:uri.action action="show" arguments="{report: report}" /></f:variable>
                        <tr>
                            <td>
                                <a href="{showUri}">
                                    <strong>{report.title -> f:format.htmlspecialchars()}</strong>
                                </a>
                            </td>
                            <td class="text-muted small">
                                <a href="{report.baseUrl -> f:format.htmlspecialchars()}" target="_blank" rel="noopener noreferrer">
                                    {report.baseUrl -> f:format.htmlspecialchars()}
                                </a>
                            </td>
                            <td>
                                <span class="badge badge-{report.statusBadgeClass}">
                                    {report.statusLabel}
                                </span>
                            </td>
                            <td class="text-center">
                                <f:if condition="{report.status} == 2">
                                    <span class="badge badge-{report.scoreBadgeClass}">
                                        {report.overallScore}/100
                                    </span>
                                </f:if>
                            </td>
                            <td class="text-center">{report.pagesCrawled}</td>
                            <td class="text-muted small text-nowrap">
                                <f:format.date format="d.m.Y H:i">{report.crdate}</f:format.date>
                            </td>
                            <td class="col-control text-nowrap">
                                <div class="btn-group btn-group-sm" role="group">
                                    <a href="{showUri}" class="btn btn-default" title="View report">
                                        <core:icon identifier="actions-eye" size="small" />
                                    </a>
                                    <f:form action="analyze" arguments="{report: report}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-default seo-confirm" title="Queue analysis" data-msg="Queue SEO analysis?">
                                            <core:icon identifier="actions-refresh" size="small" />
                                        </button>
                                    </f:form>
                                    <f:form action="delete" arguments="{report: report}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-default seo-confirm" title="Delete report" data-msg="Delete this report?">
                                            <core:icon identifier="actions-delete" size="small" />
                                        </button>
                                    </f:form>
                                </div>
                            </td>
                        </tr>
                    </f:for>
                </tbody>
            </table>
        </div>
    </f:else>
</f:if>

<script>document.querySelectorAll('.seo-confirm').forEach(el => el.addEventListener('click', e => confirm(el.dataset.msg) || e.preventDefault()));</script>

</html>
